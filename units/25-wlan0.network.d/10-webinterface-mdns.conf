# Installed by webinterface-rmpp.
#
# Drop-in for the stock /etc/systemd/network/25-wlan0.network. Turns on
# mDNS *advertising* (the stock config only does resolve) so other
# machines can reach the device by hostname over wifi without having to
# look the IP up:
#
#   https://<hostname>.local/         e.g.  https://imx8mm-ferrari.local/
#
# The TLS certificate already includes <hostname> and <hostname>.local in
# its SANs, so the cert validates fine against this URL.
[Network]
MulticastDNS=yes
